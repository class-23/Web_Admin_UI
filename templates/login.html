<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>用户登录</title>
<style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
  min-height: 100vh;
  background: #f5f5f5;
  background-image: radial-gradient(circle, #ededed 1px, transparent 1px);
  background-size: 20px 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.card {
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
  padding: 40px 36px;
  width: 100%;
  max-width: 420px;
}

.card h1 {
  text-align: center;
  font-size: 26px;
  font-weight: 700;
  color: #2d3748;
  margin-bottom: 28px;
}

/* Tab 切换 */
.tab-bar {
  display: flex;
  border-bottom: 2px solid #e2e8f0;
  margin-bottom: 24px;
}

.tab-btn {
  flex: 1;
  padding: 10px 0;
  text-align: center;
  font-size: 15px;
  font-weight: 600;
  color: #a0aec0;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  cursor: pointer;
  transition: color 0.2s, border-color 0.2s;
}

.tab-btn.active {
  color: #667eea;
  border-bottom-color: #667eea;
}

.tab-btn:hover:not(.active) {
  color: #4a5568;
}

/* 表单面板 */
.tab-panel {
  display: none;
}

.tab-panel.active {
  display: block;
}

.form-group {
  margin-bottom: 18px;
  position: relative;
}

.form-group label {
  display: block;
  font-size: 14px;
  color: #4a5568;
  margin-bottom: 6px;
  font-weight: 500;
}

.input-wrapper {
  position: relative;
}

.input-wrapper input {
  width: 100%;
  height: 44px;
  padding: 0 14px;
  border: 1.5px solid #e2e8f0;
  border-radius: 10px;
  font-size: 15px;
  color: #2d3748;
  outline: none;
  transition: border-color 0.25s ease, box-shadow 0.25s ease;
  background: #f7fafc;
}

.input-wrapper input:focus {
  border-color: #667eea;
  box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
  background: #fff;
}

.password-toggle {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  font-size: 18px;
  color: #a0aec0;
  padding: 4px;
  line-height: 1;
  transition: color 0.2s ease;
}

.password-toggle:hover {
  color: #4a5568;
}

/* 验证码行 */
.code-row {
  display: flex;
  gap: 10px;
}

.code-row input {
  flex: 1;
}

.btn-code {
  height: 44px;
  padding: 0 16px;
  border: 1.5px solid #667eea;
  border-radius: 10px;
  background: #fff;
  color: #667eea;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.2s, color 0.2s;
  min-width: 110px;
}

.btn-code:hover:not(:disabled) {
  background: #667eea;
  color: #fff;
}

.btn-code:disabled {
  border-color: #a0aec0;
  color: #a0aec0;
  cursor: not-allowed;
}

.btn-submit {
  width: 100%;
  height: 46px;
  border: none;
  border-radius: 10px;
  background: #667eea;
  color: #fff;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 8px;
  transition: background 0.25s ease, opacity 0.25s ease;
}

.btn-submit:hover {
  background: #5a67d8;
}

.btn-submit:disabled {
  background: #a0aec0;
  cursor: not-allowed;
  opacity: 0.8;
}

.footer-links {
  display: flex;
  justify-content: space-between;
  margin-top: 20px;
  font-size: 14px;
}

.footer-links a {
  color: #667eea;
  text-decoration: none;
  font-weight: 500;
  transition: color 0.2s ease;
}

.footer-links a:hover {
  color: #5a67d8;
}

.message-box {
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 500;
  margin-bottom: 14px;
  display: none;
  text-align: center;
}

.message-box.show {
  display: block;
}

.message-box.success {
  background: #c6f6d5;
  color: #276749;
  border: 1px solid #9ae6b4;
}

.message-box.error {
  background: #fed7d7;
  color: #9b2c2c;
  border: 1px solid #feb2b2;
}

@media (max-width: 480px) {
  .card {
    padding: 28px 20px;
    border-radius: 12px;
    margin: 0;
  }

  .card h1 {
    font-size: 22px;
    margin-bottom: 22px;
  }
}
</style>
</head>
<body>

<div class="card">
  <h1>用户登录</h1>

  <div id="messageBox" class="message-box"></div>

  <!-- Tab 切换 -->
  <div class="tab-bar">
    <button type="button" class="tab-btn active" data-tab="password">密码登录</button>
    <button type="button" class="tab-btn" data-tab="sms">验证码登录</button>
  </div>

  <!-- 密码登录 -->
  <div id="panel-password" class="tab-panel active">
    <form id="loginForm" novalidate>
      <div class="form-group">
        <label>账号</label>
        <div class="input-wrapper">
          <input type="text" id="account" placeholder="请输入手机号或用户名" autocomplete="username">
        </div>
      </div>

      <div class="form-group">
        <label>密码</label>
        <div class="input-wrapper">
          <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password">
          <button type="button" class="password-toggle" data-target="password">🙈</button>
        </div>
      </div>

      <button type="submit" id="btnSubmit" class="btn-submit">登录</button>
    </form>
  </div>

  <!-- 验证码登录 -->
  <div id="panel-sms" class="tab-panel">
    <form id="smsForm" novalidate>
      <div class="form-group">
        <label>手机号</label>
        <div class="input-wrapper">
          <input type="tel" id="smsPhone" placeholder="请输入手机号" maxlength="11" autocomplete="tel">
        </div>
      </div>

      <div class="form-group">
        <label>验证码</label>
        <div class="code-row">
          <div class="input-wrapper">
            <input type="text" id="smsCode" placeholder="请输入6位验证码" maxlength="6" inputmode="numeric">
          </div>
          <button type="button" id="btnSendCode" class="btn-code">获取验证码</button>
        </div>
      </div>

      <button type="submit" id="btnSmsLogin" class="btn-submit">登录</button>
    </form>
  </div>

  <div class="footer-links">
    <a href="/forgot-password">忘记密码？</a>
    <a href="/register">注册账号</a>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
  var messageBox = document.getElementById('messageBox');

  // ---- URL 提示 ----
  var urlParams = new URLSearchParams(window.location.search);
  var messages = {
    'reset': { 'success': '密码重置成功，请使用新密码登录', type: 'success' },
    'reason=password_changed': { text: '您的密码被修改，请重新登录', type: 'error' },
    'reason=session_expired': { text: '登录已过期，请重新登录', type: 'error' }
  };
  if (urlParams.get('reset') === 'success') {
    showMessage('密码重置成功，请使用新密码登录', 'success');
  } else if (urlParams.get('reason') === 'password_changed') {
    showMessage('您的密码被修改，请重新登录', 'error');
  } else if (urlParams.get('reason') === 'session_expired') {
    showMessage('登录已过期，请重新登录', 'error');
  }
  if (urlParams.toString()) {
    window.history.replaceState({}, '', window.location.pathname);
  }

  // ---- 通用 ----
  function showMessage(text, type) {
    messageBox.textContent = text;
    messageBox.className = 'message-box ' + type + ' show';
    clearTimeout(messageBox._timeout);
    messageBox._timeout = setTimeout(function () {
      messageBox.className = 'message-box';
    }, 3000);
  }

  // ---- Tab 切换 ----
  var tabBtns = document.querySelectorAll('.tab-btn');
  var panels = document.querySelectorAll('.tab-panel');

  tabBtns.forEach(function (btn) {
    btn.addEventListener('click', function () {
      var target = this.getAttribute('data-tab');
      tabBtns.forEach(function (b) { b.classList.remove('active'); });
      panels.forEach(function (p) { p.classList.remove('active'); });
      this.classList.add('active');
      document.getElementById('panel-' + target).classList.add('active');
      // 切换时清除提示
      messageBox.className = 'message-box';
    });
  });

  // ---- 密码登录 ----
  var loginForm = document.getElementById('loginForm');
  var btnSubmit = document.getElementById('btnSubmit');

  loginForm.addEventListener('submit', function (e) {
    e.preventDefault();
    var account = document.getElementById('account').value.trim();
    var password = document.getElementById('password').value;

    if (!account) { showMessage('请输入手机号或用户名', 'error'); return; }
    if (!password) { showMessage('请输入密码', 'error'); return; }

    btnSubmit.textContent = '登录中...';
    btnSubmit.disabled = true;

    fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ account: account, password: password })
    })
    .then(function (res) { return res.json(); })
    .then(function (data) {
      if (data.code === 0) {
        localStorage.setItem('username', data.data.username || account);
        window.location.href = '/';
      } else {
        showMessage(data.message || '登录失败', 'error');
        btnSubmit.textContent = '登录';
        btnSubmit.disabled = false;
      }
    })
    .catch(function () {
      showMessage('网络错误，请稍后重试', 'error');
      btnSubmit.textContent = '登录';
      btnSubmit.disabled = false;
    });
  });

  // ---- 密码显隐 ----
  document.querySelectorAll('.password-toggle').forEach(function (btn) {
    btn.addEventListener('click', function () {
      var input = document.getElementById(this.getAttribute('data-target'));
      if (input.type === 'password') {
        input.type = 'text';
        this.textContent = '🙈';
      } else {
        input.type = 'password';
        this.textContent = '👁️';
      }
    });
  });

  // ---- 验证码登录 ----
  var smsForm = document.getElementById('smsForm');
  var btnSendCode = document.getElementById('btnSendCode');
  var btnSmsLogin = document.getElementById('btnSmsLogin');
  var countdown = 0;
  var countdownTimer = null;

  // 发送验证码
  btnSendCode.addEventListener('click', function () {
    var phone = document.getElementById('smsPhone').value.trim();
    if (!phone) { showMessage('请输入手机号', 'error'); return; }
    if (!/^1[3-9]\d{9}$/.test(phone)) { showMessage('请输入正确的手机号', 'error'); return; }

    btnSendCode.disabled = true;
    btnSendCode.textContent = '发送中...';

    fetch('/api/send-code', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone: phone })
    })
    .then(function (res) { return res.json(); })
    .then(function (data) {
      if (data.code === 0) {
        showMessage('验证码已发送', 'success');
        startCountdown();
      } else {
        showMessage(data.message || '发送失败', 'error');
        btnSendCode.disabled = false;
        btnSendCode.textContent = '获取验证码';
      }
    })
    .catch(function () {
      showMessage('网络错误，请稍后重试', 'error');
      btnSendCode.disabled = false;
      btnSendCode.textContent = '获取验证码';
    });
  });

  function startCountdown() {
    countdown = 60;
    btnSendCode.textContent = countdown + 's';
    countdownTimer = setInterval(function () {
      countdown--;
      if (countdown <= 0) {
        clearInterval(countdownTimer);
        btnSendCode.disabled = false;
        btnSendCode.textContent = '获取验证码';
      } else {
        btnSendCode.textContent = countdown + 's';
      }
    }, 1000);
  }

  // 验证码登录提交
  smsForm.addEventListener('submit', function (e) {
    e.preventDefault();
    var phone = document.getElementById('smsPhone').value.trim();
    var code = document.getElementById('smsCode').value.trim();

    if (!phone) { showMessage('请输入手机号', 'error'); return; }
    if (!/^1[3-9]\d{9}$/.test(phone)) { showMessage('请输入正确的手机号', 'error'); return; }
    if (!code) { showMessage('请输入验证码', 'error'); return; }
    if (!/^\d{6}$/.test(code)) { showMessage('验证码必须是6位数字', 'error'); return; }

    btnSmsLogin.textContent = '登录中...';
    btnSmsLogin.disabled = true;

    fetch('/api/login-by-sms', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone: phone, code: code })
    })
    .then(function (res) { return res.json(); })
    .then(function (data) {
      if (data.code === 0) {
        localStorage.setItem('username', data.data.username || phone);
        window.location.href = '/';
      } else {
        showMessage(data.message || '登录失败', 'error');
        btnSmsLogin.textContent = '登录';
        btnSmsLogin.disabled = false;
      }
    })
    .catch(function () {
      showMessage('网络错误，请稍后重试', 'error');
      btnSmsLogin.textContent = '登录';
      btnSmsLogin.disabled = false;
    });
  });
});
</script>

</body>
</html>
