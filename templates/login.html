<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>用户登录</title>
<style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
  min-height: 100vh;
  background: #f5f5f5;
  background-image: radial-gradient(circle, #ededed 1px, transparent 1px);
  background-size: 20px 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.card {
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
  padding: 40px 36px;
  width: 100%;
  max-width: 420px;
}

.card h1 {
  text-align: center;
  font-size: 26px;
  font-weight: 700;
  color: #2d3748;
  margin-bottom: 28px;
}

.form-group {
  margin-bottom: 18px;
  position: relative;
}

.form-group label {
  display: block;
  font-size: 14px;
  color: #4a5568;
  margin-bottom: 6px;
  font-weight: 500;
}

.input-wrapper {
  position: relative;
}

.input-wrapper input {
  width: 100%;
  height: 44px;
  padding: 0 14px;
  border: 1.5px solid #e2e8f0;
  border-radius: 10px;
  font-size: 15px;
  color: #2d3748;
  outline: none;
  transition: border-color 0.25s ease, box-shadow 0.25s ease;
  background: #f7fafc;
}

.input-wrapper input:focus {
  border-color: #667eea;
  box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
  background: #fff;
}

.password-toggle {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  font-size: 18px;
  color: #a0aec0;
  padding: 4px;
  line-height: 1;
  transition: color 0.2s ease;
}

.password-toggle:hover {
  color: #4a5568;
}

.btn-submit {
  width: 100%;
  height: 46px;
  border: none;
  border-radius: 10px;
  background: #667eea;
  color: #fff;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 8px;
  transition: background 0.25s ease, opacity 0.25s ease;
}

.btn-submit:hover {
  background: #5a67d8;
}

.btn-submit:disabled {
  background: #a0aec0;
  cursor: not-allowed;
  opacity: 0.8;
}

.footer-links {
  display: flex;
  justify-content: space-between;
  margin-top: 20px;
  font-size: 14px;
}

.footer-links a {
  color: #667eea;
  text-decoration: none;
  font-weight: 500;
  transition: color 0.2s ease;
}

.footer-links a:hover {
  color: #5a67d8;
}

.message-box {
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 500;
  margin-bottom: 14px;
  display: none;
  text-align: center;
}

.message-box.show {
  display: block;
}

.message-box.success {
  background: #c6f6d5;
  color: #276749;
  border: 1px solid #9ae6b4;
}

.message-box.error {
  background: #fed7d7;
  color: #9b2c2c;
  border: 1px solid #feb2b2;
}

@media (max-width: 480px) {
  .card {
    padding: 28px 20px;
    border-radius: 12px;
    margin: 0;
  }

  .card h1 {
    font-size: 22px;
    margin-bottom: 22px;
  }
}
</style>
</head>
<body>

<div class="card">
  <h1>用户登录</h1>

  <div id="messageBox" class="message-box"></div>

  <form id="loginForm" novalidate>

    <div class="form-group">
      <label>账号</label>
      <div class="input-wrapper">
        <input type="text" id="account" placeholder="请输入手机号或用户名" autocomplete="username">
      </div>
    </div>

    <div class="form-group">
      <label>密码</label>
      <div class="input-wrapper">
        <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password">
        <button type="button" class="password-toggle" data-target="password">🙈</button>
      </div>
    </div>

    <button type="submit" id="btnSubmit" class="btn-submit">登录</button>
  </form>

  <div class="footer-links">
    <a href="/forgot-password">忘记密码？</a>
    <a href="/register">注册账号</a>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
  var accountInput = document.getElementById('account');
  var passwordInput = document.getElementById('password');
  var btnSubmit = document.getElementById('btnSubmit');
  var loginForm = document.getElementById('loginForm');
  var messageBox = document.getElementById('messageBox');

  var urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('reset') === 'success') {
    showMessage('密码重置成功，请使用新密码登录', 'success');
    var cleanUrl = window.location.pathname;
    window.history.replaceState({}, '', cleanUrl);
  }
  if (urlParams.get('reason') === 'password_changed') {
    showMessage('您的密码被修改，请重新登录', 'error');
    var cleanUrl = window.location.pathname;
    window.history.replaceState({}, '', cleanUrl);
  }
  if (urlParams.get('reason') === 'session_expired') {
    showMessage('登录已过期，请重新登录', 'error');
    var cleanUrl = window.location.pathname;
    window.history.replaceState({}, '', cleanUrl);
  }

  function showMessage(text, type) {
    messageBox.textContent = text;
    messageBox.className = 'message-box ' + type + ' show';
    clearTimeout(messageBox._timeout);
    messageBox._timeout = setTimeout(function () {
      messageBox.className = 'message-box';
    }, 3000);
  }

  loginForm.addEventListener('submit', function (e) {
    e.preventDefault();

    var account = accountInput.value.trim();
    var password = passwordInput.value;

    if (!account) {
      showMessage('请输入手机号或用户名', 'error');
      return;
    }

    if (!password) {
      showMessage('请输入密码', 'error');
      return;
    }

    btnSubmit.textContent = '登录中...';
    btnSubmit.disabled = true;

    fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        account: account,
        password: password
      })
    })
    .then(function (res) { return res.json(); })
    .then(function (data) {
      if (data.code === 0) {
        localStorage.setItem('username', data.data.username || account);
        window.location.href = '/';
      } else {
        showMessage(data.message || '登录失败', 'error');
        btnSubmit.textContent = '登录';
        btnSubmit.disabled = false;
      }
    })
    .catch(function () {
      showMessage('网络错误，请稍后重试', 'error');
      btnSubmit.textContent = '登录';
      btnSubmit.disabled = false;
    });
  });

  document.querySelectorAll('.password-toggle').forEach(function (btn) {
    btn.addEventListener('click', function () {
      var targetId = this.getAttribute('data-target');
      var input = document.getElementById(targetId);
      if (input.type === 'password') {
        input.type = 'text';
        this.textContent = '🙈';
      } else {
        input.type = 'password';
        this.textContent = '👁️';
      }
    });
  });
});
</script>

</body>
</html>
