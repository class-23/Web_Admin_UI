{% extends "base.html" %}
{% block title %}重置密码 - QuantClaw{% endblock %}
{% block content %}
<div style="max-width:28rem;margin:4rem auto 0" x-data="resetApp()">
    <div class="card p-8">
        <h1 style="font-size:1.375rem;font-weight:700;color:var(--text-primary);text-align:center;margin-bottom:0.5rem">重置密码</h1>
        <p style="text-align:center;font-size:0.8125rem;color:var(--text-muted);margin-bottom:1.5rem">输入重置令牌和新密码</p>

        <div x-show="error" x-cloak class="alert alert-error" style="margin-bottom:1rem" x-text="error"></div>
        <div x-show="success" x-cloak class="alert alert-success" style="margin-bottom:1rem" x-text="success"></div>

        <form @submit.prevent="resetPassword()">
            <div style="margin-bottom:1rem">
                <label class="label-dark">重置令牌</label>
                <input type="text" x-model="token" required class="input-dark" placeholder="粘贴重置令牌">
            </div>
            <div style="margin-bottom:1rem">
                <label class="label-dark">新密码</label>
                <input type="password" x-model="newPassword" required minlength="6" class="input-dark" placeholder="至少6个字符">
            </div>
            <div style="margin-bottom:1.5rem">
                <label class="label-dark">确认新密码</label>
                <input type="password" x-model="newPassword2" required class="input-dark" placeholder="再次输入新密码">
            </div>
            <button type="submit" :disabled="loading" class="btn-accent" style="width:100%;padding:0.625rem">
                <span x-show="!loading">重置密码</span>
                <span x-show="loading">重置中...</span>
            </button>
        </form>

        <p style="text-align:center;margin-top:1rem;font-size:0.8125rem;color:var(--text-muted)">
            <a href="/login" style="color:var(--accent);text-decoration:none;font-weight:500" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">返回登录</a>
        </p>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
function resetApp() {
    return {
        token: new URLSearchParams(window.location.search).get('token') || '',
        newPassword: '', newPassword2: '',
        error: '', success: '', loading: false,
        async resetPassword() {
            this.loading = true; this.error = ''; this.success = '';
            if (this.newPassword !== this.newPassword2) { this.error = '两次密码不一致'; this.loading = false; return; }
            try {
                const r = await fetch('/api/auth/reset-password', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: this.token.trim(), new_password: this.newPassword })
                });
                const d = await r.json();
                if (!r.ok) { this.error = d.detail || '重置失败'; this.loading = false; return; }
                this.success = '密码重置成功！正在跳转登录...';
                setTimeout(() => window.location.href = '/login', 2000);
            } catch(e) { this.error = '网络错误'; } finally { this.loading = false; }
        }
    };
}
</script>
{% endblock %}
