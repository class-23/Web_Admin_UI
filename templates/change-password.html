<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>修改密码</title>
<style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
  min-height: 100vh;
  background: #f5f5f5;
  background-image: radial-gradient(circle, #ffffff 1px, transparent 1px);
  background-size: 20px 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.card {
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
  padding: 40px 36px;
  width: 100%;
  max-width: 420px;
}

.card h1 {
  text-align: center;
  font-size: 26px;
  font-weight: 700;
  color: #2d3748;
  margin-bottom: 8px;
}

.card .subtitle {
  text-align: center;
  font-size: 14px;
  color: #a0aec0;
  margin-bottom: 28px;
}

.form-group {
  margin-bottom: 18px;
  position: relative;
}

.form-group label {
  display: block;
  font-size: 14px;
  color: #4a5568;
  margin-bottom: 6px;
  font-weight: 500;
}

.input-wrapper {
  position: relative;
}

.input-wrapper input {
  width: 100%;
  height: 44px;
  padding: 0 40px 0 14px;
  border: 1.5px solid #e2e8f0;
  border-radius: 10px;
  font-size: 15px;
  color: #2d3748;
  outline: none;
  transition: border-color 0.25s ease, box-shadow 0.25s ease;
  background: #f7fafc;
}

.input-wrapper input:focus {
  border-color: #667eea;
  box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
  background: #fff;
}

.input-wrapper input.error {
  border-color: #e53e3e;
  box-shadow: 0 0 0 3px rgba(229, 62, 62, 0.1);
}

.password-toggle {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  font-size: 18px;
  color: #a0aec0;
  padding: 4px;
  line-height: 1;
  transition: color 0.2s ease;
}

.password-toggle:hover {
  color: #4a5568;
}

.error-text {
  color: #e53e3e;
  font-size: 12px;
  margin-top: 4px;
  display: none;
}

.error-text.show {
  display: block;
}

.strength-bar {
  display: flex;
  gap: 6px;
  align-items: center;
  margin-top: 6px;
}

.strength-segment {
  flex: 1;
  height: 4px;
  border-radius: 2px;
  background: #e2e8f0;
  transition: background 0.3s ease;
}

.strength-segment.weak { background: #e53e3e; }
.strength-segment.medium { background: #ed8936; }
.strength-segment.strong { background: #38a169; }

.strength-text {
  font-size: 12px;
  margin-left: 6px;
  font-weight: 500;
  white-space: nowrap;
  min-width: 20px;
}

.strength-text.weak { color: #e53e3e; }
.strength-text.medium { color: #ed8936; }
.strength-text.strong { color: #38a169; }

.btn-submit {
  width: 100%;
  height: 46px;
  border: none;
  border-radius: 10px;
  background: #667eea;
  color: #fff;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 8px;
  transition: background 0.25s ease, opacity 0.25s ease;
}

.btn-submit:hover { background: #5a67d8; }
.btn-submit:disabled {
  background: #a0aec0;
  cursor: not-allowed;
  opacity: 0.8;
}

.footer-link {
  text-align: center;
  margin-top: 20px;
  font-size: 14px;
  color: #718096;
}

.footer-link a {
  color: #667eea;
  text-decoration: none;
  font-weight: 500;
  transition: color 0.2s ease;
}

.footer-link a:hover { color: #5a67d8; }

.message-box {
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 500;
  margin-bottom: 14px;
  display: none;
  text-align: center;
}

.message-box.show { display: block; }

.message-box.success {
  background: #c6f6d5;
  color: #276749;
  border: 1px solid #9ae6b4;
}

.message-box.error {
  background: #fed7d7;
  color: #9b2c2c;
  border: 1px solid #feb2b2;
}

@media (max-width: 480px) {
  .card {
    padding: 28px 20px;
    border-radius: 12px;
    margin: 0;
  }
  .card h1 {
    font-size: 22px;
    margin-bottom: 6px;
  }
}
</style>
</head>
<body>

<div class="card">
  <h1>修改密码</h1>
  <p class="subtitle">请输入旧密码和新密码</p>

  <div id="messageBox" class="message-box"></div>

  <form id="changePasswordForm" novalidate>
    <div class="form-group">
      <label>旧密码</label>
      <div class="input-wrapper">
        <input type="password" id="oldPassword" placeholder="请输入旧密码" autocomplete="current-password">
        <button type="button" class="password-toggle" data-target="oldPassword">👁️</button>
      </div>
      <div id="oldPasswordError" class="error-text"></div>
    </div>

    <div class="form-group">
      <label>新密码</label>
      <div class="input-wrapper">
        <input type="password" id="newPassword" placeholder="至少8位，含大小写字母和数字" autocomplete="new-password">
        <button type="button" class="password-toggle" data-target="newPassword">👁️</button>
      </div>
      <div class="strength-bar" id="strengthBar">
        <span class="strength-segment" id="seg1"></span>
        <span class="strength-segment" id="seg2"></span>
        <span class="strength-segment" id="seg3"></span>
        <span class="strength-text" id="strengthText"></span>
      </div>
      <div id="newPasswordError" class="error-text"></div>
    </div>

    <div class="form-group">
      <label>确认新密码</label>
      <div class="input-wrapper">
        <input type="password" id="confirmPassword" placeholder="请再次输入新密码" autocomplete="new-password">
        <button type="button" class="password-toggle" data-target="confirmPassword">👁️</button>
      </div>
      <div id="confirmPasswordError" class="error-text"></div>
    </div>

    <button type="submit" id="btnSubmit" class="btn-submit">确认修改</button>
  </form>

  <div class="footer-link">
    <a href="/">返回首页</a>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
  var oldPasswordInput = document.getElementById('oldPassword');
  var newPasswordInput = document.getElementById('newPassword');
  var confirmPasswordInput = document.getElementById('confirmPassword');
  var btnSubmit = document.getElementById('btnSubmit');
  var changePasswordForm = document.getElementById('changePasswordForm');
  var messageBox = document.getElementById('messageBox');

  var oldPasswordError = document.getElementById('oldPasswordError');
  var newPasswordError = document.getElementById('newPasswordError');
  var confirmPasswordError = document.getElementById('confirmPasswordError');

  var seg1 = document.getElementById('seg1');
  var seg2 = document.getElementById('seg2');
  var seg3 = document.getElementById('seg3');
  var strengthText = document.getElementById('strengthText');
  var PASSWORD_MAX_BYTES = 72;
  var PASSWORD_MAX_BYTES_MESSAGE = '密码最多支持72字节（约72个英文字符，包含中文或其他特殊字符时上限更低）';

  function showMessage(text, type) {
    messageBox.textContent = text;
    messageBox.className = 'message-box ' + type + ' show';
    clearTimeout(messageBox._timeout);
    messageBox._timeout = setTimeout(function () {
      messageBox.className = 'message-box';
    }, 4000);
  }

  function setError(el, inputEl, msg) {
    if (msg) {
      el.textContent = msg;
      el.classList.add('show');
      inputEl.classList.add('error');
    } else {
      el.textContent = '';
      el.classList.remove('show');
      inputEl.classList.remove('error');
    }
  }

  function getPasswordStrength(password) {
    if (password.length < 8) return 'weak';
    var hasUpper = /[A-Z]/.test(password);
    var hasLower = /[a-z]/.test(password);
    var hasDigit = /\d/.test(password);
    var types = (hasUpper ? 1 : 0) + (hasLower ? 1 : 0) + (hasDigit ? 1 : 0);
    if (types === 3) return 'strong';
    if (types >= 2) return 'medium';
    return 'weak';
  }

  function updateStrengthBar(password) {
    seg1.className = 'strength-segment';
    seg2.className = 'strength-segment';
    seg3.className = 'strength-segment';
    strengthText.className = 'strength-text';
    strengthText.textContent = '';

    if (!password) return;

    var strength = getPasswordStrength(password);
    if (strength === 'weak') {
      seg1.classList.add('weak');
      strengthText.textContent = '弱';
      strengthText.classList.add('weak');
    } else if (strength === 'medium') {
      seg1.classList.add('medium');
      seg2.classList.add('medium');
      strengthText.textContent = '中';
      strengthText.classList.add('medium');
    } else if (strength === 'strong') {
      seg1.classList.add('strong');
      seg2.classList.add('strong');
      seg3.classList.add('strong');
      strengthText.textContent = '强';
      strengthText.classList.add('strong');
    }
  }

  function getUtf8ByteLength(value) {
    return new TextEncoder().encode(value).length;
  }

  function getErrorMessage(data, fallback) {
    if (data && typeof data.message === 'string' && data.message) {
      return data.message;
    }
    if (data && typeof data.detail === 'string' && data.detail) {
      return data.detail;
    }
    if (data && Array.isArray(data.detail) && data.detail.length > 0) {
      var firstError = data.detail[0];
      if (firstError && typeof firstError.msg === 'string' && firstError.msg) {
        return firstError.msg;
      }
    }
    return fallback;
  }

  function validateNewPassword(value) {
    if (!value) {
      return '请输入新密码';
    }
    if (value.length < 8) {
      return '密码长度至少为8位';
    }
    if (getUtf8ByteLength(value) > PASSWORD_MAX_BYTES) {
      return PASSWORD_MAX_BYTES_MESSAGE;
    }
    if (!/[a-z]/.test(value)) {
      return '密码必须包含小写字母';
    }
    if (!/[A-Z]/.test(value)) {
      return '密码必须包含大写字母';
    }
    if (!/\d/.test(value)) {
      return '密码必须包含数字';
    }
    return '';
  }

  function validateConfirmPassword(password, confirmPassword) {
    if (!confirmPassword) {
      return '请再次输入新密码';
    }
    if (password !== confirmPassword) {
      return '两次密码输入不一致';
    }
    return '';
  }

  newPasswordInput.addEventListener('input', function () {
    var newPassword = newPasswordInput.value;
    updateStrengthBar(newPassword);
    setError(newPasswordError, newPasswordInput, validateNewPassword(newPassword));
    setError(
      confirmPasswordError,
      confirmPasswordInput,
      validateConfirmPassword(newPassword, confirmPasswordInput.value)
    );
  });

  confirmPasswordInput.addEventListener('input', function () {
    var pw = newPasswordInput.value;
    var cpw = confirmPasswordInput.value;
    setError(confirmPasswordError, confirmPasswordInput, validateConfirmPassword(pw, cpw));
  });

  changePasswordForm.addEventListener('submit', function (e) {
    e.preventDefault();

    var oldPassword = oldPasswordInput.value;
    var newPassword = newPasswordInput.value;
    var confirmPassword = confirmPasswordInput.value;

    var valid = true;

    if (!oldPassword) {
      setError(oldPasswordError, oldPasswordInput, '请输入旧密码');
      valid = false;
    } else {
      setError(oldPasswordError, oldPasswordInput, '');
    }

    var newPasswordValidationMessage = validateNewPassword(newPassword);
    if (newPasswordValidationMessage) {
      setError(newPasswordError, newPasswordInput, newPasswordValidationMessage);
      valid = false;
    } else {
      setError(newPasswordError, newPasswordInput, '');
    }

    var confirmPasswordValidationMessage = validateConfirmPassword(newPassword, confirmPassword);
    if (confirmPasswordValidationMessage) {
      setError(confirmPasswordError, confirmPasswordInput, confirmPasswordValidationMessage);
      valid = false;
    } else {
      setError(confirmPasswordError, confirmPasswordInput, '');
    }

    if (!valid) return;

    btnSubmit.textContent = '修改中...';
    btnSubmit.disabled = true;

    fetch('/api/change_password', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      credentials: 'include',
      body: JSON.stringify({
        old_password: oldPassword,
        new_password: newPassword,
        confirm_password: confirmPassword
      })
    })
    .then(function (res) { return res.json(); })
    .then(function (data) {
      if (data.code === 0) {
        showMessage(data.message, 'success');
        localStorage.removeItem('username');
        setTimeout(function () {
          window.location.href = '/login';
        }, 2000);
      } else {
        showMessage(getErrorMessage(data, '修改失败'), 'error');
        btnSubmit.textContent = '确认修改';
        btnSubmit.disabled = false;
      }
    })
    .catch(function (err) {
      console.error('Error:', err);
      showMessage('网络错误，请稍后重试', 'error');
      btnSubmit.textContent = '确认修改';
      btnSubmit.disabled = false;
    });
  });

  document.querySelectorAll('.password-toggle').forEach(function (btn) {
    btn.addEventListener('click', function () {
      var targetId = this.getAttribute('data-target');
      var input = document.getElementById(targetId);
      if (input.type === 'password') {
        input.type = 'text';
        this.textContent = '🙈';
      } else {
        input.type = 'password';
        this.textContent = '👁️';
      }
    });
  });
});
</script>

</body>
</html>
