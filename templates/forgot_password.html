{% extends "base.html" %}
{% block title %}忘记密码 - QuantClaw{% endblock %}
{% block content %}
<div style="max-width:28rem;margin:4rem auto 0" x-data="forgotApp()">
    <div class="card p-8">
        <h1 style="font-size:1.375rem;font-weight:700;color:var(--text-primary);text-align:center;margin-bottom:0.5rem">找回密码</h1>
        <p style="text-align:center;font-size:0.8125rem;color:var(--text-muted);margin-bottom:1.5rem">输入注册邮箱，获取重置链接</p>

        <div x-show="error" x-cloak class="alert alert-error" style="margin-bottom:1rem" x-text="error"></div>
        <div x-show="success" x-cloak class="alert alert-success" style="margin-bottom:1rem" x-text="success"></div>

        <form x-show="!tokenSent" @submit.prevent="sendReset()">
            <div style="margin-bottom:1.5rem">
                <label class="label-dark">注册邮箱</label>
                <input type="email" x-model="email" required class="input-dark" placeholder="your@email.com">
            </div>
            <button type="submit" :disabled="loading" class="btn-accent" style="width:100%;padding:0.625rem">
                <span x-show="!loading">发送重置链接</span>
                <span x-show="loading">发送中...</span>
            </button>
        </form>

        <div x-show="tokenSent" x-cloak>
            <p style="font-size:0.8125rem;color:var(--text-secondary);margin-bottom:1rem">
                密码重置令牌已生成（15分钟有效）：
            </p>
            <div class="card" style="background:var(--bg-input);padding:0.75rem;margin-bottom:1rem;word-break:break-all;font-family:var(--font-mono);font-size:0.75rem;color:var(--accent)" x-text="resetToken"></div>
            <p style="font-size:0.75rem;color:var(--text-muted);margin-bottom:1rem">
                复制上方令牌，点击下方按钮前往重置密码页面。
            </p>
            <button @click="goReset()" class="btn-accent" style="width:100%;padding:0.625rem">
                前往重置密码
            </button>
        </div>

        <p style="text-align:center;margin-top:1rem;font-size:0.8125rem;color:var(--text-muted)">
            <a href="/login" style="color:var(--accent);text-decoration:none;font-weight:500" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">返回登录</a>
        </p>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
function forgotApp() {
    return {
        email: '', error: '', success: '', loading: false, tokenSent: false, resetToken: '',
        async sendReset() {
            this.loading = true; this.error = ''; this.success = '';
            try {
                const r = await fetch('/api/auth/forgot-password', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: this.email })
                });
                const d = await r.json();
                if (!r.ok) { this.error = d.detail || '请求失败'; this.loading = false; return; }
                this.resetToken = d.reset_token;
                this.tokenSent = true;
                this.success = '重置令牌已生成';
            } catch(e) { this.error = '网络错误'; } finally { this.loading = false; }
        },
        goReset() {
            window.location.href = '/reset-password?token=' + encodeURIComponent(this.resetToken);
        }
    };
}
</script>
{% endblock %}
