<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙虾盒子管理后台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background-color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .card-shadow {
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
        }
        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .loading-spinner {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #3b82f6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <div class="max-w-6xl mx-auto w-full px-4 py-8 flex-grow">
        <!-- Header Section -->
        <div class="bg-blue-50/50 rounded-2xl p-8 mb-8 relative overflow-hidden border border-blue-100/50">
            <div class="relative z-10">
                <h1 class="text-3xl font-bold text-gray-800 mb-2">龙虾盒子管理后台</h1>
                <p class="text-gray-500 text-sm">设备统一管理与快捷访问入口</p>
                <!-- 右上角登录注册按钮 -->
                 <div class="flex items-center" id="unauth-buttons">
                    <button onclick="window.location.href='/login'" class="bg-blue-500 text-white px-4 py-2 rounded-md hover:bg-blue-600 transition-colors cursor-pointer" style="margin-left: 750px; margin-top: -80px;">
                        登录
                    </button>
                    <button onclick="window.location.href='/register'" class="bg-blue-500 text-white px-4 py-2 rounded-md hover:bg-blue-600 transition-colors cursor-pointer ml-2" style="margin-left: 20px; margin-top: -80px;">
                        注册
                    </button>
                </div>
                <div class="flex items-center gap-3" id="auth-user-info" style="display:none; margin-left: 750px; margin-top: -80px;">
                    <span id="display-username" class="text-gray-700 font-medium text-sm"></span>
                    
                    <button onclick="handleLogout()" class="bg-red-100 text-red-600 px-3 py-1.5 rounded-md hover:bg-red-200 transition-colors cursor-pointer text-sm">
                        退出登录
                    </button>
                </div>
            </div>
            <!-- Decorative background element -->
            <div class="absolute top-0 right-0 -mt-8 -mr-8 w-64 h-64 bg-blue-100/30 rounded-full blur-3xl"></div>
        </div>

        <!-- Cards Grid -->
        <div id="main-content" class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8 fade-in">
            <!-- Card 1: 控制面板 -->
            <div onclick="requireLogin('/login')" class="bg-white rounded-xl p-6 border border-gray-100 card-shadow hover:border-blue-200 transition-colors cursor-pointer block">
                <div class="flex items-start mb-4">
                    <div class="p-2 bg-blue-50 rounded-lg text-blue-500 mr-4">
                        <i data-lucide="gauge" class="w-6 h-6"></i>
                    </div>
                    <div>
                        <h2 class="text-lg font-bold text-gray-800">控制面板</h2>
                    </div>
                </div>
                <div class="space-y-1">
                    <p class="text-gray-500 text-sm flex items-center">
                        初始密码：<code class="bg-gray-100 px-1.5 py-0.5 rounded text-gray-700 mx-1">openclaw123456</code>
                    </p>
                </div>
            </div>

            <!-- Card 2: 文件管理 -->
            <div onclick="requireLogin('/file_manager')" class="bg-white rounded-xl p-6 border border-gray-100 card-shadow hover:border-blue-200 transition-colors cursor-pointer block">
                <div class="flex items-start">
                    <div class="p-2 bg-blue-50 rounded-lg text-blue-500 mr-4">
                        <i data-lucide="folder" class="w-6 h-6"></i>
                    </div>
                    <div>
                        <h2 class="text-lg font-bold text-gray-800">文件管理</h2>
                    </div>
                </div>
            </div>

            <!-- Card 3: 终端 -->
            <div onclick="requireLogin('/login')" class="bg-white rounded-xl p-6 border border-gray-100 card-shadow cursor-pointer">
                <div class="flex items-start mb-4">
                    <div class="p-2 bg-blue-50 rounded-lg text-blue-500 mr-4">
                        <i data-lucide="layout-grid" class="w-6 h-6"></i>
                    </div>
                    <div>
                        <h2 class="text-lg font-bold text-gray-800">终端</h2>
                    </div>
                </div>
                <div class="space-y-1">
                    <p class="text-gray-500 text-sm">
                        登录盒子的用户名：<code class="bg-gray-100 px-1.5 py-0.5 rounded text-gray-700 mx-1">root</code>
                    </p>
                    <p class="text-gray-500 text-sm">
                        初始密码：<code class="bg-gray-100 px-1.5 py-0.5 rounded text-gray-700 mx-1">openclaw</code>
                    </p>
                </div>
            </div>

            <!-- Card 4: 教程 -->
            <div onclick="requireLogin('/login')" class="bg-white rounded-xl p-6 border border-gray-100 card-shadow cursor-pointer">
                <div class="flex items-start mb-4">
                    <div class="p-2 bg-blue-50 rounded-lg text-blue-500 mr-4">
                        <i data-lucide="book-open" class="w-6 h-6"></i>
                    </div>
                    <div>
                        <h2 class="text-lg font-bold text-gray-800">教程</h2>
                    </div>
                </div>
            </div>
        </div>

        <!-- Device Info Section -->
        <div id="device-info" class="bg-white rounded-xl border border-gray-100 card-shadow overflow-hidden fade-in">
            <div class="p-4 border-b border-gray-50 bg-gray-50/30 flex items-center justify-between">
                <h2 class="font-bold text-gray-800">设备信息</h2>
                <button id="refresh-devices-btn" onclick="fetchDevices()" class="px-3 py-1 text-xs bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition-colors flex items-center gap-1">
                    <i data-lucide="refresh-cw" class="w-3 h-3"></i> 刷新
                </button>
            </div>
            <div id="device-info-content" class="p-6">
                <div class="flex items-center justify-center py-8">
                    <div class="loading-spinner mr-3"></div>
                    <p class="text-gray-400">正在加载设备信息...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="py-6 text-center text-gray-400 text-sm">
        openclawbox©2026
    </footer>

    <script>
        lucide.createIcons();

        function handleFileManagerClick() {
            window.location.href = '/file_manager';
        }

        function getStatusBadge(device) {
            if (device.isOnline === true) {
                return '<span class="bg-green-100 text-green-600 text-[10px] px-1.5 py-0.5 rounded font-bold">在线</span>';
            } else if (device.isOnline === false) {
                return '<span class="bg-red-100 text-red-600 text-[10px] px-1.5 py-0.5 rounded font-bold">离线</span>';
            }
            return '<span class="bg-gray-100 text-gray-500 text-[10px] px-1.5 py-0.5 rounded font-bold">未知</span>';
        }

        function renderDevices(devices) {
            const container = document.getElementById('device-info-content');
            if (!container) return;

            if (!devices || devices.length === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-8 text-gray-400">
                        <i data-lucide="monitor-off" class="w-10 h-10 mb-3 text-gray-300"></i>
                        <p class="text-sm">暂无设备</p>
                    </div>`;
                lucide.createIcons();
                return;
            }

            let html = '';
            devices.forEach(function(device, index) {
                const deviceName = device.hostname || device.mac || ('设备' + (index + 1));
                const lastIp = device.lastIp || '-';
                const lastSsid = device.lastSsid || '-';
                const mac = device.mac || '-';
                const model = device.model || '-';
                const firmware = device.firmwareVersion || '-';

                html += `
                    <div class="border border-gray-100 rounded-lg mb-4 last:mb-0 overflow-hidden">
                        <div class="p-4 bg-gray-50/50 border-b border-gray-100 flex items-center justify-between">
                            <div class="flex items-center gap-2">
                                <i data-lucide="monitor" class="w-5 h-5 text-blue-500"></i>
                                <span class="font-semibold text-gray-800">${deviceName}</span>
                            </div>
                            ${getStatusBadge(device)}
                        </div>
                        <div class="p-4">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-3">
                                <div class="flex items-center justify-between">
                                    <span class="text-gray-400 text-sm">MAC 地址</span>
                                    <span class="text-gray-700 text-sm font-mono uppercase">${mac}</span>
                                </div>
                                <div class="flex items-center justify-between">
                                    <span class="text-gray-400 text-sm">最后 IP</span>
                                    <span class="text-gray-700 text-sm">${lastIp}</span>
                                </div>
                                <div class="flex items-center justify-between">
                                    <span class="text-gray-400 text-sm">Wi-Fi SSID</span>
                                    <span class="text-gray-700 text-sm">${lastSsid}</span>
                                </div>
                                <div class="flex items-center justify-between">
                                    <span class="text-gray-400 text-sm">设备型号</span>
                                    <span class="text-gray-700 text-sm">${model}</span>
                                </div>
                                <div class="flex items-center justify-between">
                                    <span class="text-gray-400 text-sm">固件版本</span>
                                    <span class="text-gray-700 text-sm">${firmware}</span>
                                </div>
                            </div>
                        </div>
                    </div>`;
            });

            container.innerHTML = html;
            lucide.createIcons();
        }

        function renderError(message) {
            const container = document.getElementById('device-info-content');
            if (!container) return;
            container.innerHTML = `
                <div class="flex flex-col items-center justify-center py-8 text-gray-400">
                    <i data-lucide="alert-circle" class="w-10 h-10 mb-3 text-yellow-400"></i>
                    <p class="text-sm">${message}</p>
                    <button onclick="fetchDevices()" class="mt-3 px-4 py-1.5 text-xs bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition-colors">重新加载</button>
                </div>`;
            lucide.createIcons();
        }

        async function fetchDevices() {
            const container = document.getElementById('device-info-content');
            if (container) {
                container.innerHTML = `
                    <div class="flex items-center justify-center py-8">
                        <div class="loading-spinner mr-3"></div>
                        <p class="text-gray-400">正在加载设备信息...</p>
                    </div>`;
            }

            try {
                const response = await fetch('/api/devices');
                if (response.status === 401) {
                    renderError('登录后可查看设备信息');
                    return;
                }
                if (!response.ok) {
                    throw new Error('服务器响应异常（状态码：' + response.status + '）');
                }
                const result = await response.json();
                if (result.code === 0) {
                    renderDevices(result.data.devices);
                } else {
                    renderError('获取设备列表失败：' + (result.message || '未知错误'));
                }
            } catch (error) {
                console.error('获取设备列表失败:', error);
                renderError('无法连接到服务器，请检查网络连接');
            }
        }

        function handleLogout() {
            fetch('/api/logout', {
                method: 'POST',
                credentials: 'include'
            })
            .then(function() {
                localStorage.removeItem('username');
                window.location.reload();
            })
            .catch(function() {
                localStorage.removeItem('username');
                window.location.reload();
            });
        }

        async function checkLoginStatus() {
            var unauthDiv = document.getElementById('unauth-buttons');
            var authDiv = document.getElementById('auth-user-info');
            var displayName = document.getElementById('display-username');

            try {
                var res = await fetch('/api/current_user', { credentials: 'include' });
                if (!res.ok && res.status === 401) {
                    window.location.href = '/login?reason=password_changed';
                    return false;
                }
                var data = await res.json();
                if (data.code === 0 && data.data && data.data.username) {
                    var username = data.data.username;
                    if (unauthDiv) unauthDiv.style.display = 'none';
                    if (authDiv) authDiv.style.display = 'flex';
                    if (displayName) displayName.textContent = username;
                    if (!localStorage.getItem('username')) {
                        localStorage.setItem('username', username);
                    }
                    return true;
                }
            } catch (e) {
                console.error('Check login failed:', e);
            }
            if (unauthDiv) unauthDiv.style.display = 'flex';
            if (authDiv) authDiv.style.display = 'none';
            return false;
        }

        function requireLogin(targetUrl) {
            var username = localStorage.getItem('username');
            if (username) {
                window.location.href = targetUrl;
            } else {
                window.location.href = '/login';
            }
        }

        async function init() {
            var unauthDiv = document.getElementById('unauth-buttons');
            var authDiv = document.getElementById('auth-user-info');
            if (unauthDiv) unauthDiv.style.display = 'flex';
            if (authDiv) authDiv.style.display = 'none';
            var isLoggedIn = await checkLoginStatus();
            if (isLoggedIn) {
                fetchDevices();
                setInterval(fetchDevices, 30000);
            } else {
                renderError('登录后可查看设备信息');
            }
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
