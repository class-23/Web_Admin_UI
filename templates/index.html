<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantClaw 网络扫描</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: rgba(255,255,255,0.03);
            --accent-cyan: #00d9ff;
            --accent-green: #00ff88;
            --accent-purple: #a855f7;
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --border-color: rgba(255,255,255,0.08);
            --glow-cyan: 0 0 20px rgba(0,217,255,0.3);
            --glow-green: 0 0 20px rgba(0,255,136,0.3);
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
        }
        
        /* Animated background grid */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0,217,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,217,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: -1;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 50px 24px;
        }
        
        /* Header Section */
        .header {
            text-align: center;
            margin-bottom: 50px;
        }
        
        h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 12px;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--accent-cyan) 0%, var(--accent-green) 50%, var(--accent-cyan) 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s ease-in-out infinite;
        }
        
        @keyframes shimmer {
            0%, 100% { background-position: 0% center; }
            50% { background-position: 200% center; }
        }
        
        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            font-weight: 400;
        }
        
        /* Stats Bar */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px 24px;
            text-align: center;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        
        .stat-card:hover {
            border-color: var(--accent-cyan);
            box-shadow: var(--glow-cyan);
        }
        
        .stat-card.highlight {
            background: linear-gradient(135deg, rgba(0,255,136,0.1) 0%, rgba(0,217,255,0.1) 100%);
            border-color: rgba(0,255,136,0.3);
        }
        
        .stat-label {
            color: var(--text-muted);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }
        
        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-cyan);
            font-family: 'JetBrains Mono', monospace;
        }
        
        .stat-card.highlight .stat-value {
            color: var(--accent-green);
        }
        
        /* Scan Button */
        .scan-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            max-width: 280px;
            margin: 0 auto 50px;
            padding: 18px 36px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #000;
            background: linear-gradient(135deg, var(--accent-cyan) 0%, var(--accent-green) 100%);
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 20px rgba(0,217,255,0.25);
            position: relative;
            overflow: hidden;
        }
        
        .scan-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }
        
        .scan-btn:hover::before {
            left: 100%;
        }
        
        .scan-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0,217,255,0.4);
        }
        
        .scan-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .scan-btn .spinner {
            width: 22px;
            height: 22px;
            border: 3px solid rgba(0,0,0,0.2);
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Status Message */
        .status {
            text-align: center;
            margin-bottom: 30px;
            padding: 16px 24px;
            border-radius: 12px;
            font-weight: 500;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        
        .status.success {
            background: rgba(0,255,136,0.1);
            color: var(--accent-green);
            border: 1px solid rgba(0,255,136,0.2);
        }
        
        .status.error {
            background: rgba(239,68,68,0.1);
            color: #ef4444;
            border: 1px solid rgba(239,68,68,0.2);
        }
        
        .status.scanning {
            background: rgba(0,217,255,0.1);
            color: var(--accent-cyan);
            border: 1px solid rgba(0,217,255,0.2);
        }
        
        /* Device Grid */
        .section-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .section-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: linear-gradient(180deg, var(--accent-cyan), var(--accent-green));
            border-radius: 2px;
        }
        
        .device-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .device-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 24px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }
        
        .device-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .device-card:hover {
            transform: translateY(-6px);
            border-color: rgba(0,217,255,0.3);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        
        .device-card:hover::before {
            opacity: 1;
        }
        
        .device-card.quant {
            background: linear-gradient(135deg, rgba(0,255,136,0.08) 0%, rgba(0,217,255,0.08) 100%);
            border-color: rgba(0,255,136,0.3);
            animation: quant-pulse 3s ease-in-out infinite;
        }
        
        @keyframes quant-pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(0,255,136,0.2); }
            50% { box-shadow: 0 0 30px 5px rgba(0,255,136,0.1); }
        }
        
        .device-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }
        
        .device-icon {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            background: linear-gradient(135deg, #3b3b4f 0%, #2a2a3a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            flex-shrink: 0;
        }
        
        .device-icon.quant-icon {
            background: linear-gradient(135deg, var(--accent-cyan) 0%, var(--accent-green) 100%);
            box-shadow: 0 4px 15px rgba(0,255,136,0.3);
        }
        
        .device-title {
            font-size: 1.15rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .badge {
            display: inline-flex;
            align-items: center;
            background: var(--accent-green);
            color: #000;
            font-size: 0.65rem;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .device-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 4px;
        }
        
        .device-details {
            display: grid;
            gap: 12px;
        }
        
        .detail-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            background: rgba(255,255,255,0.02);
            border-radius: 10px;
        }
        
        .detail-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: rgba(0,217,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            flex-shrink: 0;
        }
        
        .detail-label {
            color: var(--text-muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .detail-value {
            color: var(--accent-cyan);
            font-size: 0.95rem;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-weight: 500;
        }
        
        .device-card.quant .detail-value {
            color: var(--accent-green);
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 80px 40px;
            background: var(--bg-card);
            border: 1px dashed var(--border-color);
            border-radius: 24px;
            margin-bottom: 40px;
        }
        
        .empty-state .icon {
            font-size: 5rem;
            margin-bottom: 24px;
            opacity: 0.5;
        }
        
        .empty-state h3 {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-secondary);
        }
        
        .empty-state p {
            color: var(--text-muted);
            max-width: 400px;
            margin: 0 auto;
            line-height: 1.6;
        }
        
        /* Help Card */
        .help-card {
            background: linear-gradient(135deg, rgba(168,85,247,0.1) 0%, rgba(0,217,255,0.1) 100%);
            border: 1px solid rgba(168,85,247,0.2);
            border-radius: 20px;
            padding: 32px;
            margin-top: 40px;
        }
        
        .help-card h3 {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .help-card ol {
            color: var(--text-secondary);
            line-height: 2;
            padding-left: 24px;
        }
        
        .help-card code {
            background: rgba(0,217,255,0.15);
            color: var(--accent-cyan);
            padding: 3px 10px;
            border-radius: 6px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
        }
        
        /* Footer */
        footer {
            text-align: center;
            margin-top: 60px;
            padding: 30px;
            color: var(--text-muted);
            font-size: 0.85rem;
            border-top: 1px solid var(--border-color);
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(0,217,255,0.3);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0,217,255,0.5);
        }
        
        /* Responsive */
        @media (max-width: 640px) {
            .container {
                padding: 30px 16px;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .stats-bar {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            
            .device-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 QuantClaw</h1>
            <p class="subtitle">局域网设备发现与连接</p>
        </div>
        
        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-label">本机 IP</div>
                <div class="stat-value" id="localIp">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">网关地址</div>
                <div class="stat-value" id="gateway">-</div>
            </div>
            <div class="stat-card highlight">
                <div class="stat-label">发现设备</div>
                <div class="stat-value" id="deviceCount">0</div>
            </div>
        </div>
        
        <button class="scan-btn" id="scanBtn" onclick="startScan()">
            <span>🚀</span>
            <span>开始扫描</span>
        </button>
        
        <div class="status" id="status"></div>
        
        <div id="deviceContainer">
            <!-- 设备卡片将在这里动态生成 -->
        </div>
        
        <div class="help-card">
            <h3>💡 无法发现 QuantClaw 设备？</h3>
            <ol>
                <li>确保 QuantClaw 设备已开机并连接到同一网络</li>
                <li>如果设备未连接 Wi-Fi，需要先配置网络</li>
                <li>可尝试用网线直连设备，然后访问 <code>http://9.9.9.99:7681</code></li>
                <li>或通过 AP 模式连接：搜索 Wi-Fi 名 <code>QuantClaw-XXXX</code></li>
            </ol>
        </div>
        
        <footer>
            QuantClaw Network Scanner · 局域网设备发现工具
        </footer>
    </div>
    
    <script>
        // 获取本机信息
        async function loadInfo() {
            try {
                const res = await fetch('/api/info');
                const data = await res.json();
                document.getElementById('localIp').textContent = data.localIp || data.local_ip || '-';
                document.getElementById('gateway').textContent = data.gateway || '-';
            } catch (e) {
                console.error('Failed to load info:', e);
            }
        }
        
        // 开始扫描
        async function startScan() {
            const btn = document.getElementById('scanBtn');
            const status = document.getElementById('status');
            const container = document.getElementById('deviceContainer');
            
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span><span>扫描中...</span>';
            status.className = 'status scanning';
            status.textContent = '正在扫描局域网，请稍候...';
            container.innerHTML = '';
            document.getElementById('deviceCount').textContent = '0';
            
            try {
                const res = await fetch('/api/scan');
                const data = await res.json();
                
                document.getElementById('deviceCount').textContent = data.total;
                
                if (data.devices.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">📡</div>
                            <h3>未发现任何设备</h3>
                            <p>可能原因：需要 root 权限运行，或网络环境不支持扫描</p>
                        </div>
                    `;
                    status.className = 'status error';
                    status.textContent = '扫描完成，但未发现设备';
                } else {
                    let quantHtml = '';
                    let otherHtml = '';
                    
                    // Quant 设备（如果有）
                    if (data.quant_device) {
                        quantHtml = renderDevice(data.quant_device, true);
                    }
                    
                    // 其他设备
                    const otherDevices = data.devices.filter(d => !d.is_quant);
                    if (otherDevices.length > 0) {
                        otherHtml = otherDevices.map(d => renderDevice(d, false)).join('');
                    }
                    
                    let html = '';
                    if (quantHtml) {
                        html += '<div class="section-title">🍎 QuantClaw 设备</div>';
                        html += '<div class="device-grid">' + quantHtml + '</div>';
                    }
                    if (otherHtml) {
                        html += '<div class="section-title">其他设备</div>';
                        html += '<div class="device-grid">' + otherHtml + '</div>';
                    }
                    
                    container.innerHTML = html;
                    status.className = 'status success';
                    status.textContent = `✨ 扫描完成！发现 ${data.total} 台设备`;
                }
                
            } catch (e) {
                status.className = 'status error';
                status.textContent = '扫描失败: ' + e.message;
                console.error('Scan error:', e);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<span>🚀</span><span>重新扫描</span>';
            }
        }
        
        // 渲染设备卡片
        function renderDevice(device, isQuant) {
            const icon = isQuant ? '🍎' : '💻';
            const deviceType = getDeviceType(device);
            
            return `
                <div class="device-card ${isQuant ? 'quant' : ''}">
                    <div class="device-header">
                        <div class="device-icon ${isQuant ? 'quant-icon' : ''}">${icon}</div>
                        <div>
                            <div class="device-title">
                                ${device.hostname || deviceType}
                                ${isQuant ? '<span class="badge">QUANT</span>' : ''}
                            </div>
                            <div class="device-meta">${deviceType}</div>
                        </div>
                    </div>
                    <div class="device-details">
                        <div class="detail-row">
                            <div class="detail-icon">🌐</div>
                            <div>
                                <div class="detail-label">IP 地址</div>
                                <div class="detail-value">${device.ip}</div>
                            </div>
                        </div>
                        <div class="detail-row">
                            <div class="detail-icon">📍</div>
                            <div>
                                <div class="detail-label">MAC 地址</div>
                                <div class="detail-value">${device.mac}</div>
                            </div>
                        </div>
                        ${device.name ? `
                        <div class="detail-row">
                            <div class="detail-icon">📝</div>
                            <div>
                                <div class="detail-label">设备名称</div>
                                <div class="detail-value">${device.name}</div>
                            </div>
                        </div>
                        ` : ''}
                    </div>
                </div>
            `;
        }
        
        // 根据 MAC 地址判断设备类型
        function getDeviceType(device) {
            const mac = device.mac || '';
            const prefixes = {
                'Apple': ['AC:87', 'A8:60', '3C:15', '00:1C:B3', 'F0:18', 'D0:25', 'A4:5C'],
                'Raspberry Pi': ['B8:27:EB', 'DC:A6:32', 'E4:5F:01', '28:CD:C1', '2C:CF:67'],
                'Samsung': ['00:16:32', '00:17:C9', '00:1D', 'B4:79', '94:35', '74:45'],
                'Xiaomi': ['34:80', '64:09', '68:DF', '98:FA', '34:CE'],
                'Huawei': ['00:18:82', '00:25', '34:00', '00:1E', 'F8:01', '2C:AB'],
                'Intel': ['00:1B', '00:1C', '00:1D', '00:1E', '00:1F', '00:20'],
                'TP-Link': ['14:CC', '14:CF', '1C:3B', '30:B5', '50:C7', '54:C8'],
                'Dell': ['00:06', '00:0D', '00:12', '00:14', '00:18', '00:1A'],
                'HP': ['00:0E', '00:0F', '00:11', '00:14', '00:17', '00:1B']
            };
            
            for (const [brand, prefixs] of Object.entries(prefixes)) {
                for (const prefix of prefixs) {
                    if (mac.toUpperCase().startsWith(prefix)) {
                        return brand + ' 设备';
                    }
                }
            }
            
            return '未知设备';
        }
        
        // 页面加载时获取信息
        loadInfo();
    </script>
</body>
</html>
