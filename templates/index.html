<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙虾盒子管理后台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/index.css">
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col relative">

    <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-rose-400 via-orange-300 to-rose-400 z-50"></div>

    <!-- ================= 1. Top Nav ================= -->
    <nav class="bg-white/70 backdrop-blur-md shadow-sm border-b border-slate-200/60 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-rose-50 to-rose-100 text-rose-500 rounded-xl flex items-center justify-center text-xl shadow-[0_2px_10px_-3px_rgba(225,29,72,0.3)] border border-rose-200/50">
                        🦞                    </div>
                    <span class="font-bold text-lg tracking-wide text-slate-800 bg-clip-text text-transparent bg-gradient-to-r from-slate-800 to-slate-500">
                        龙虾盒子管理后台
                    </span>
                </div>

                <div class="flex items-center gap-3" id="unauth-buttons">
                    <button onclick="window.location.href='/login'" class="bg-rose-500 text-white px-4 py-2 rounded-full hover:bg-rose-600 transition-colors text-sm font-medium">
                        登录
                    </button>
                    <button onclick="window.location.href='/register'" class="bg-white text-slate-600 px-4 py-2 rounded-full hover:bg-slate-50 transition-colors text-sm font-medium border border-slate-200">
                        注册
                    </button>
                </div>
                <div class="flex items-center gap-5 text-sm" id="auth-user-info" style="display:none;">
                    <div class="flex items-center gap-2 px-3 py-1.5 bg-white border border-slate-200/60 rounded-full cursor-pointer hover:bg-slate-50 hover:shadow-sm transition-all">
                        <img src="https://ui-avatars.com/api/?name=xiaoma&background=ffe4e6&color=e11d48&bold=true" alt="User Avatar" class="w-7 h-7 rounded-full shadow-sm ring-2 ring-white">
                        <span class="font-semibold text-slate-700" id="display-username"></span>
                    </div>
                    <button onclick="window.location.href='/setting'" class="w-8 h-8 flex items-center justify-center rounded-lg text-slate-400 hover:text-slate-700 hover:bg-slate-100 transition-colors" title="设置">
                        <i class="ri-settings-3-line text-lg"></i>
                    </button>
                    <button onclick="handleLogout()" class="flex items-center gap-1.5 text-slate-400 hover:text-rose-600 font-medium transition-colors">
                        <i class="ri-logout-circle-r-line text-lg"></i>
                        <span class="hidden sm:inline">退出</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- ================= Main Content ================= -->
    <main class="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8 md:py-10">

        <!-- ================= 2. Device Selector Panel ================= -->
        <section class="mb-10" id="device-selector-panel">
            <div class="relative group">
                <div class="absolute -inset-0.5 bg-gradient-to-r from-rose-200 to-blue-200 rounded-[2rem] blur opacity-40 group-hover:opacity-60 transition duration-500"></div>

                <div class="active-device-panel relative rounded-[2rem] shadow-sm border border-white overflow-hidden z-10">
                    <i class="ri-cpu-line absolute -right-10 -top-10 text-[18rem] text-slate-800/[0.03] -z-10 transform -rotate-12 pointer-events-none"></i>

                    <div class="p-6 md:p-8">
                        <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-8">
                            <div>
                                <div class="inline-flex items-center gap-1.5 px-3 py-1 bg-white/60 backdrop-blur-sm rounded-full text-xs font-bold text-rose-500 mb-3 border border-rose-100">
                                    <span class="relative flex h-2 w-2">
                                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-rose-400 opacity-75"></span>
                                        <span class="relative inline-flex rounded-full h-2 w-2 bg-rose-500"></span>
                                    </span>
                                    控制台核心
                                </div>
                                <h2 class="text-2xl font-bold text-slate-800 flex items-center gap-2 mb-2">当前操作设备</h2>
                                <p class="text-sm text-slate-500 flex items-center gap-1.5">
                                    <i class="ri-corner-right-down-line"></i> 下方的控制面板、终端等功能将基于此设备执行
                                </p>
                            </div>

                            <div class="w-full md:w-80 relative">
                                <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-rose-400">
                                    <i class="ri-router-line text-lg"></i>
                                </div>
                                <select id="device-selector" onchange="handleDeviceSelectionChange(this.value)" class="w-full appearance-none bg-white/80 backdrop-blur-md border border-slate-200/80 text-slate-700 py-4 pl-12 pr-10 rounded-2xl focus:outline-none focus:ring-4 focus:ring-rose-500/10 focus:border-rose-400 font-bold cursor-pointer transition-all shadow-sm hover:bg-white">
                                    <option value="">请选择已注册设备</option>
                                </select>
                                <div class="absolute right-4 top-1/2 -translate-y-1/2 flex items-center justify-center w-6 h-6 bg-slate-100 rounded-full pointer-events-none">
                                    <i class="ri-arrow-down-s-line text-slate-500"></i>
                                </div>
                            </div>
                        </div>

                        <div class="bg-white/50 backdrop-blur-xl rounded-2xl p-5 border border-white shadow-[0_8px_30px_rgb(0,0,0,0.02)] flex flex-col xl:flex-row items-start xl:items-center justify-between gap-5 relative overflow-hidden">
                            <div class="absolute left-0 top-0 bottom-0 w-1 bg-gradient-to-b from-orange-400 to-rose-400"></div>

                            <div class="flex items-center gap-4 pl-2">
                                <div class="w-14 h-14 bg-white rounded-2xl flex items-center justify-center shadow-sm border border-slate-100 shrink-0">
                                    <i class="ri-hard-drive-2-line text-3xl text-slate-700"></i>
                                </div>
                                <div>
                                    <div class="flex items-center gap-3 mb-1">
                                        <span class="font-bold text-slate-800 text-xl tracking-tight" id="selected-device-name">未选择设备</span>
                                        <span class="px-2.5 py-0.5 rounded-md text-xs font-semibold bg-slate-200 text-slate-600 flex items-center gap-1.5 shadow-inner" id="selected-device-status">
                                            <span class="w-1.5 h-1.5 rounded-full bg-slate-400"></span> 未选择
                                        </span>
                                    </div>
                                    <div class="text-sm font-medium text-slate-500 flex items-center gap-2">
                                        <i class="ri-map-pin-line opacity-50"></i> IP地址：<span class="font-mono text-slate-600 bg-slate-100/50 px-1 rounded" id="selected-device-ip">-</span>
                                    </div>
                                </div>
                            </div>

                            <div id="device-action-hint" class="bg-blue-50/80 backdrop-blur-sm border border-blue-200/60 text-blue-700 text-sm px-4 py-3 rounded-xl flex items-start gap-3 xl:max-w-md shadow-sm">
                                <div class="bg-blue-100 text-blue-500 rounded-full p-1 shrink-0 mt-0.5">
                                    <i class="ri-information-line text-base leading-none"></i>
                                </div>
                                <p class="leading-relaxed font-medium">请选择一台已注册设备后，再进入控制面板、终端或文件管理。</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- ================= 3. Quick Action Cards ================= -->
        <section class="mb-12" id="main-content">
            <h2 class="text-lg font-bold text-slate-800 mb-5 flex items-center gap-2 px-1">
                <span class="w-1.5 h-5 bg-rose-400 rounded-full"></span> 快捷功能入口
            </h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5">

                <button id="control-panel-card" onclick="handleControlPanelClick()" class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200/80 hover:-translate-y-1.5 hover:shadow-xl hover:shadow-blue-500/10 hover:border-blue-200 transition-all cursor-pointer group text-left w-full">
                    <div class="w-12 h-12 bg-blue-50 rounded-2xl flex items-center justify-center mb-5 group-hover:bg-blue-500 group-hover:shadow-lg group-hover:shadow-blue-500/30 transition-all duration-300">
                        <i class="ri-dashboard-3-line text-2xl text-blue-500 group-hover:text-white transition-colors"></i>
                    </div>
                    <h3 class="font-bold text-slate-800 mb-2 text-lg">控制面板</h3>
                    <p class="text-xs font-medium text-slate-500 leading-relaxed">
                        根据设备型号自动选择<br>
                        <span class="inline-block mt-1.5 bg-slate-50 border border-slate-200 text-slate-600 px-1.5 py-0.5 rounded font-mono shadow-sm">6060</span> /
                        <span class="inline-block mt-1.5 bg-slate-50 border border-slate-200 text-slate-600 px-1.5 py-0.5 rounded font-mono shadow-sm">42617</span> 控制面板端口
                    </p>
                </button>

                <button id="terminal-card" onclick="handleTerminalClick()" class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200/80 hover:-translate-y-1.5 hover:shadow-xl hover:shadow-slate-800/10 hover:border-slate-300 transition-all cursor-pointer group text-left w-full">
                    <div class="w-12 h-12 bg-slate-100 rounded-2xl flex items-center justify-center mb-5 group-hover:bg-slate-800 group-hover:shadow-lg group-hover:shadow-slate-800/30 transition-all duration-300">
                        <i class="ri-terminal-box-line text-2xl text-slate-700 group-hover:text-white transition-colors"></i>
                    </div>
                    <h3 class="font-bold text-slate-800 mb-2 text-lg">终端访问</h3>
                    <p class="text-xs font-medium text-slate-500 leading-relaxed">
                        一键直达设备后台<br>固定跳转至设备的
                        <span class="inline-block mt-1.5 bg-slate-800 text-white font-bold px-1.5 py-0.5 rounded font-mono shadow-sm">7681</span> 端口
                    </p>
                </button>

                <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200/80 opacity-60 text-left w-full">
                    <div class="absolute top-4 right-4 text-[10px] font-bold bg-gradient-to-r from-amber-100 to-orange-100 text-amber-700 px-2 py-1 rounded-lg border border-amber-200/50">规划中</div>
                    <div class="w-12 h-12 bg-amber-50 rounded-2xl flex items-center justify-center mb-5">
                        <i class="ri-folder-2-line text-2xl text-amber-500"></i>
                    </div>
                    <h3 class="font-bold text-slate-800 mb-2 text-lg">文件管理</h3>
                    <p class="text-xs font-medium text-slate-500 leading-relaxed">
                        预留设备绑定入口<br>后续支持远程文件传输与管理
                    </p>
                </div>

                <button onclick="window.location.href='/tutorial'" class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200/80 hover:-translate-y-1.5 hover:shadow-xl hover:shadow-emerald-500/10 hover:border-emerald-200 transition-all cursor-pointer group text-left w-full">
                    <div class="w-12 h-12 bg-emerald-50 rounded-2xl flex items-center justify-center mb-5 group-hover:bg-emerald-500 group-hover:shadow-lg group-hover:shadow-emerald-500/30 transition-all duration-300">
                        <i class="ri-book-read-line text-2xl text-emerald-500 group-hover:text-white transition-colors"></i>
                    </div>
                    <h3 class="font-bold text-slate-800 mb-2 text-lg">使用教程</h3>
                    <p class="text-xs font-medium text-slate-500 leading-relaxed">
                        新手使用指南、常见问题解答<br>及设备高级玩法探秘
                    </p>
                </button>

            </div>
        </section>

        <!-- ================= 4. Device Info Cards ================= -->
        <section id="device-info">
            <div class="flex items-center justify-between mb-5 px-1">
                <h2 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                    <span class="w-1.5 h-5 bg-slate-400 rounded-full"></span> 我的设备信息
                </h2>
                <button id="refresh-devices-btn" onclick="fetchDevices()" class="text-sm font-semibold text-slate-600 hover:text-rose-600 flex items-center gap-1.5 transition-all bg-white px-4 py-2 rounded-xl border border-slate-200 shadow-sm hover:shadow hover:border-rose-200 hover:bg-rose-50 active:scale-95">
                    <i class="ri-refresh-line"></i> <span class="hidden sm:inline">更新全部状态</span>
                </button>
            </div>

            <div id="device-info-content" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                <div class="flex items-center justify-center py-8 col-span-full">
                    <div class="loading-spinner mr-3"></div>
                    <p class="text-gray-400">正在加载设备信息...</p>
                </div>
            </div>
        </section>

    </main>

    <footer class="mt-auto py-8 text-center text-slate-400 text-sm font-medium">
        <p>openclawbox &copy; 2026</p>
    </footer>

    <div id="global-toast" class="fixed right-4 top-4 z-50 hidden max-w-sm rounded-lg border border-gray-200 bg-white px-4 py-3 text-sm text-gray-700 shadow-lg toast-enter"></div>

    <script src="/static/js/index.js"></script>
</body>
</html>
