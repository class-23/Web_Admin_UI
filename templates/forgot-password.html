<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>忘记密码</title>
<style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
  min-height: 100vh;
  background: #f5f5f5;
  background-image: radial-gradient(circle, #ffffff 1px, transparent 1px);
  background-size: 20px 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.card {
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
  padding: 40px 36px;
  width: 100%;
  max-width: 420px;
}

.card h1 {
  text-align: center;
  font-size: 26px;
  font-weight: 700;
  color: #2d3748;
  margin-bottom: 8px;
}

.card .subtitle {
  text-align: center;
  font-size: 14px;
  color: #a0aec0;
  margin-bottom: 28px;
}

.form-group {
  margin-bottom: 18px;
  position: relative;
}

.form-group label {
  display: block;
  font-size: 14px;
  color: #4a5568;
  margin-bottom: 6px;
  font-weight: 500;
}

.input-wrapper {
  position: relative;
}

.input-wrapper input {
  width: 100%;
  height: 44px;
  padding: 0 14px;
  border: 1.5px solid #e2e8f0;
  border-radius: 10px;
  font-size: 15px;
  color: #2d3748;
  outline: none;
  transition: border-color 0.25s ease, box-shadow 0.25s ease;
  background: #f7fafc;
}

.input-wrapper input:focus {
  border-color: #667eea;
  box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
  background: #fff;
}

.input-wrapper input.error {
  border-color: #e53e3e;
  box-shadow: 0 0 0 3px rgba(229, 62, 62, 0.1);
}

.error-text {
  color: #e53e3e;
  font-size: 12px;
  margin-top: 4px;
  display: none;
}

.error-text.show {
  display: block;
}

.code-row {
  display: flex;
  gap: 10px;
}

.code-row .input-wrapper {
  flex: 1;
}

.btn-code {
  height: 44px;
  padding: 0 16px;
  border: none;
  border-radius: 10px;
  background: #667eea;
  color: #fff;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.25s ease, opacity 0.25s ease;
  flex-shrink: 0;
}

.btn-code:hover {
  background: #5a67d8;
}

.btn-code:disabled {
  background: #a0aec0;
  cursor: not-allowed;
  opacity: 0.8;
}

.btn-submit {
  width: 100%;
  height: 46px;
  border: none;
  border-radius: 10px;
  background: #667eea;
  color: #fff;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 8px;
  transition: background 0.25s ease, opacity 0.25s ease;
}

.btn-submit:hover {
  background: #5a67d8;
}

.btn-submit:disabled {
  background: #a0aec0;
  cursor: not-allowed;
  opacity: 0.8;
}

.footer-link {
  text-align: center;
  margin-top: 20px;
  font-size: 14px;
  color: #718096;
}

.footer-link a {
  color: #667eea;
  text-decoration: none;
  font-weight: 500;
  transition: color 0.2s ease;
}

.footer-link a:hover {
  color: #5a67d8;
}

.message-box {
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 500;
  margin-bottom: 14px;
  display: none;
  text-align: center;
}

.message-box.show {
  display: block;
}

.message-box.success {
  background: #c6f6d5;
  color: #276749;
  border: 1px solid #9ae6b4;
}

.message-box.error {
  background: #fed7d7;
  color: #9b2c2c;
  border: 1px solid #feb2b2;
}

@media (max-width: 480px) {
  .card {
    padding: 28px 20px;
    border-radius: 12px;
    margin: 0;
  }

  .card h1 {
    font-size: 22px;
    margin-bottom: 6px;
  }

  .btn-code {
    padding: 0 12px;
    font-size: 13px;
  }
}
</style>
</head>
<body>

<div class="card">
  <h1>忘记密码</h1>
  <p class="subtitle">通过手机号验证重置您的密码</p>

  <div id="messageBox" class="message-box"></div>

  <form id="forgotForm" novalidate>
    <div class="form-group">
      <label>手机号</label>
      <div class="input-wrapper">
        <input type="tel" id="phone" placeholder="请输入已绑定的手机号" maxlength="11" autocomplete="tel">
      </div>
      <div id="phoneError" class="error-text"></div>
    </div>

    <div class="form-group">
      <label>验证码</label>
      <div class="code-row">
        <div class="input-wrapper">
          <input type="text" id="code" placeholder="请输入验证码" maxlength="6" autocomplete="off">
        </div>
        <button type="button" id="btnSendCode" class="btn-code">获取验证码</button>
      </div>
      <div id="codeError" class="error-text"></div>
    </div>

    <button type="submit" id="btnSubmit" class="btn-submit">下一步</button>
  </form>

  <div class="footer-link">
    <a href="login.html">返回登录</a>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
  var phoneInput = document.getElementById('phone');
  var codeInput = document.getElementById('code');
  var btnSendCode = document.getElementById('btnSendCode');
  var btnSubmit = document.getElementById('btnSubmit');
  var forgotForm = document.getElementById('forgotForm');
  var messageBox = document.getElementById('messageBox');

  var phoneError = document.getElementById('phoneError');
  var codeError = document.getElementById('codeError');

  var countdownTimer = null;
  var countdownSeconds = 0;

  function showMessage(text, type) {
    messageBox.textContent = text;
    messageBox.className = 'message-box ' + type + ' show';
    clearTimeout(messageBox._timeout);
    messageBox._timeout = setTimeout(function () {
      messageBox.className = 'message-box';
    }, 4000);
  }

  function setError(el, inputEl, msg) {
    if (msg) {
      el.textContent = msg;
      el.classList.add('show');
      inputEl.classList.add('error');
    } else {
      el.textContent = '';
      el.classList.remove('show');
      inputEl.classList.remove('error');
    }
  }

  function validatePhone(value) {
    return /^1[3-9]\d{9}$/.test(value);
  }

  phoneInput.addEventListener('input', function () {
    var val = phoneInput.value.trim();
    if (val && !validatePhone(val)) {
      setError(phoneError, phoneInput, '请输入正确的手机号');
    } else {
      setError(phoneError, phoneInput, '');
    }
  });

  phoneInput.addEventListener('blur', function () {
    var val = phoneInput.value.trim();
    if (val && !validatePhone(val)) {
      setError(phoneError, phoneInput, '请输入正确的手机号');
    }
  });

  btnSendCode.addEventListener('click', function () {
    var phone = phoneInput.value.trim();
    if (!phone || !validatePhone(phone)) {
      showMessage('请先输入正确的手机号', 'error');
      return;
    }

    btnSendCode.disabled = true;
    btnSendCode.textContent = '发送中...';

    fetch('/api/forgot-password/send-code', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone: phone })
    })
    .then(function (res) { return res.json(); })
    .then(function (data) {
      if (data.code === 0) {
        showMessage('验证码已发送', 'success');
        countdownSeconds = 60;
        btnSendCode.textContent = countdownSeconds + '秒后重试';
        countdownTimer = setInterval(function () {
          countdownSeconds--;
          if (countdownSeconds <= 0) {
            clearInterval(countdownTimer);
            countdownTimer = null;
            btnSendCode.disabled = false;
            btnSendCode.textContent = '获取验证码';
          } else {
            btnSendCode.textContent = countdownSeconds + '秒后重试';
          }
        }, 1000);
      } else {
        showMessage(data.message || '发送失败', 'error');
        btnSendCode.disabled = false;
        btnSendCode.textContent = '获取验证码';
      }
    })
    .catch(function () {
      showMessage('网络错误，请稍后重试', 'error');
      btnSendCode.disabled = false;
      btnSendCode.textContent = '获取验证码';
    });
  });

  forgotForm.addEventListener('submit', function (e) {
    e.preventDefault();

    var phone = phoneInput.value.trim();
    var code = codeInput.value.trim();

    var valid = true;

    if (!phone || !validatePhone(phone)) {
      setError(phoneError, phoneInput, '请输入正确的手机号');
      valid = false;
    }

    if (!code) {
      setError(codeError, codeInput, '请输入验证码');
      valid = false;
    } else if (!/^\d{6}$/.test(code)) {
      setError(codeError, codeInput, '验证码为6位数字');
      valid = false;
    } else {
      setError(codeError, codeInput, '');
    }

    if (!valid) return;

    btnSubmit.textContent = '验证中...';
    btnSubmit.disabled = true;

    fetch('/api/forgot-password/verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone: phone, code: code })
    })
    .then(function (res) { return res.json(); })
    .then(function (data) {
      if (data.code === 0) {
        var resetToken = data.data.reset_token;
        window.location.href = 'reset-password.html?token=' + encodeURIComponent(resetToken);
      } else {
        showMessage(data.message || '验证失败', 'error');
        btnSubmit.textContent = '下一步';
        btnSubmit.disabled = false;
      }
    })
    .catch(function () {
      showMessage('网络错误，请稍后重试', 'error');
      btnSubmit.textContent = '下一步';
      btnSubmit.disabled = false;
    });
  });
});
</script>

</body>
</html>
