services:
  redis:
    image: redis:7-alpine
    container_name: quantclaw_redis
    restart: always
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quantclaw_app
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "${HOST_PORT:-8082}:${APP_PORT:-8081}"
    environment:
      - PG_HOST=6.6.6.66
      - PG_PORT=5432
      - PG_USER=quantclaw
      - PG_PASSWORD=123quantclaw
      - PG_DBNAME=web_admin
      - PG_POOL_MIN=2
      - PG_POOL_MAX=10
      - APP_PORT=${APP_PORT:-8081}
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-here-change-in-production}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_EXPIRE_MINUTES=${JWT_EXPIRE_MINUTES:-1440}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0