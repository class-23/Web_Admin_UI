services:
  postgres:
    image: postgres:16-alpine
    container_name: quantclaw_pg
    restart: always
    environment:
      POSTGRES_USER: quantclaw
      POSTGRES_PASSWORD: 123quantclaw
      POSTGRES_DB: web_admin
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantclaw"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: quantclaw_redis
    restart: always
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quantclaw_app
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${HOST_PORT:-8082}:${APP_PORT:-8081}"
    environment:
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_USER=quantclaw
      - PG_PASSWORD=123quantclaw
      - PG_DBNAME=web_admin
      - PG_POOL_MIN=2
      - PG_POOL_MAX=10
      - APP_PORT=${APP_PORT:-8081}
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-here-change-in-production}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_EXPIRE_MINUTES=${JWT_EXPIRE_MINUTES:-1440}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0

volumes:
  pgdata: