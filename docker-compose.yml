services:

  app:
    build:
      context: .        # ✅ 修复这里！
      dockerfile: Dockerfile
    container_name: quantclaw_app
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:

      - "${HOST_PORT:-8082}:${APP_PORT:-8081}"
    environment:
      - PG_HOST=host.docker.internal
      - PG_PORT=5432
      - PG_USER=quantclaw
      - PG_PASSWORD=quantclaw
      - PG_DBNAME=quantclaw
      - PG_POOL_MIN=2
      - PG_POOL_MAX=10
      - APP_PORT=${APP_PORT:-8081}
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-here-change-in-production}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_EXPIRE_MINUTES=${JWT_EXPIRE_MINUTES:-1440}
      - REDIS_HOST=host.docker.internal
      - REDIS_PORT=6379
      - REDIS_DB=0

