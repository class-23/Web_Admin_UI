services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quantclaw_app
    restart: always
    env_file:
      - .env
    # 远程 PG/Redis 直接走公网/内网，不走 host.docker.internal
    ports:
      - "${HOST_PORT:-8082}:${APP_PORT:-8081}"
    environment:
      - APP_PORT=${APP_PORT:-8081}
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-here-change-in-production}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_EXPIRE_MINUTES=${JWT_EXPIRE_MINUTES:-1440}

