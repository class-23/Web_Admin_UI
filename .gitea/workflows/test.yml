name: Python 单元测试

on:
  push:
    branches:
      - master
      - feature/**
  pull_request:
    branches:
      - master

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    container:
      image: python:3.10-slim

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 查看 Python 版本
        run: |
          python --version
          pip --version

      - name: 安装系统依赖
        run: |
          apt-get update
          apt-get install -y gcc libpq-dev

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: 运行单元测试
        run: |
          python -m pytest tests/test_login_time_utils.py -q
          python -m pytest tests/test_legacy_quantclaw_receiver.py -q
          python -m pytest tests/test_main_auth_dependencies.py -q
          python -m pytest tests/test_main_quantclaw_utils.py -q
          python -m pytest tests/test_main_device_manager.py -q
          python -m pytest tests/test_main_quantclaw_database.py -q