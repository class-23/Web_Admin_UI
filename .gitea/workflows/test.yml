name: Python 单元测试

on:
  push:
    branches:
      - master
      - feature/**
  pull_request:
    branches:
      - master

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    container:
      image: node:20-bookworm

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装系统依赖
        run: |
          apt-get update
          apt-get install -y python3 python3-pip python3-venv python3-dev gcc libpq-dev

      - name: 查看 Python 版本
        run: |
          python3 --version
          pip3 --version
          node --version

      - name: 创建虚拟环境并安装 Python 依赖
        run: |
          python3 -m venv .venv-ci
          .venv-ci/bin/python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then .venv-ci/bin/python -m pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then .venv-ci/bin/python -m pip install -r requirements-dev.txt; fi

      - name: 运行单元测试
        run: |
          .venv-ci/bin/python -m pytest tests/test_login_time_utils.py -q
          .venv-ci/bin/python -m pytest tests/test_legacy_quantclaw_receiver.py -q
          .venv-ci/bin/python -m pytest tests/test_main_auth_dependencies.py -q
          .venv-ci/bin/python -m pytest tests/test_main_quantclaw_utils.py -q
          .venv-ci/bin/python -m pytest tests/test_main_device_manager.py -q
          .venv-ci/bin/python -m pytest tests/test_main_quantclaw_database.py -q