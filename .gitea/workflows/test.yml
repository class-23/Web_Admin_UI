name: Python 单元测试

on:
  push:
    branches:
      - master
      - feature/**
  pull_request:
    branches:
      - master

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: 运行单元测试
        run: |
          python -m pytest tests/test_login_time_utils.py -q
          python -m pytest tests/test_legacy_quantclaw_receiver.py -q
          python -m pytest tests/test_main_auth_dependencies.py -q
          python -m pytest tests/test_main_quantclaw_utils.py -q
          python -m pytest tests/test_main_device_manager.py -q
          python -m pytest tests/test_main_quantclaw_database.py -q