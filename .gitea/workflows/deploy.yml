name: CI/CD to Gitea

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  SERVER_HOST: 6.6.6.66
  SERVER_USER: quant
  SERVER_PASSWORD: 123quant-speed

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        run: |
          PACKAGE_MANAGER=""
          if command -v apk &> /dev/null; then
            PACKAGE_MANAGER="apk"
          elif command -v yum &> /dev/null; then
            PACKAGE_MANAGER="yum"
          elif command -v apt-get &> /dev/null; then
            PACKAGE_MANAGER="apt-get"
          fi

          if [ -n "$PACKAGE_MANAGER" ]; then
            case $PACKAGE_MANAGER in
              apk) apk add --no-cache openssh-client sshpass ;;
              yum) yum install -y openssh-clients sshpass ;;
              apt-get) apt-get update && apt-get install -y openssh-client sshpass ;;
            esac
          fi

          export SSHPASS="${SERVER_PASSWORD:-123quant-speed}"
          sshpass -e ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null "$SERVER_USER@$SERVER_HOST" << 'ENDSSH'
            set -e
            cd /home/quant
            if [ -d Web_Admin_UI ]; then
              cd Web_Admin_UI && git pull
            else
              git clone https://gitea.com/quantclaw/Web_Admin_UI.git
              cd Web_Admin_UI
            fi
            docker compose down 2>/dev/null || true
            docker compose up -d --build
            docker logs --tail 30 quantclaw_app 2>/dev/null || echo "Container may not be running"
          ENDSSH