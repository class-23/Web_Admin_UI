name: CI/CD to Gitea

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  SERVER_HOST: 6.6.6.66
  SERVER_USER: quant
  SERVER_PASSWORD: 123quant-speed
  WORK_DIR: /home/quant/data/dev/Web_Admin_UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        run: |
          if command -v apt-get &> /dev/null; then
            apt-get update && apt-get install -y openssh-client sshpass
          elif command -v apk &> /dev/null; then
            apk add --no-cache openssh-client sshpass
          elif command -v yum &> /dev/null; then
            yum install -y openssh-clients sshpass
          fi

          export SSHPASS="${SERVER_PASSWORD}"
          sshpass -e ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null "$SERVER_USER@$SERVER_HOST" << 'ENDSSH'
            set -e
            cd /home/quant/data/dev/Web_Admin_UI
            docker compose down || true
            sudo git pull
            sudo chown -R quant:quant /home/quant/data/dev/Web_Admin_UI
            docker compose up -d
            docker logs --tail 30 quantclaw_app || true
          ENDSSH