name: CI/CD to Gitea

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  IMAGE_NAME: quantclaw_app
  SERVER_HOST: 6.6.6.66
  SERVER_USER: quant
  SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        run: |
          apt-get update && apt-get install -y openssh-client sshpass

          sshpass -p "$SERVER_PASSWORD" ssh -o StrictHostKeyChecking=no "$SERVER_USER@$SERVER_HOST" << 'ENDSSH'
            set -e
            cd /home/quant/Web_Admin_UI || mkdir -p /home/quant/Web_Admin_UI
            if [ -d .git ]; then
              git pull
            else
              git clone https://gitea.com/quantclaw/Web_Admin_UI.git .
            fi
            docker compose down || true
            docker compose up -d --build
            docker logs --tail 20 quantclaw_app || true
          ENDSSH