name: CI/CD to Gitea

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  REGISTRY: gitea.mycompany.com
  IMAGE_NAME: ${{ gitea.repository }}
  IMAGE_TAG: ${{ gitea.sha }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Gitea Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GITEA_USERNAME }}
          password: ${{ secrets.GITEA_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{.Raw}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: |
          pip install pytest pytest-cov
          pytest tests/ || echo "No tests found"

  deploy:
    runs-on: ubuntu-latest
    needs: [test]
    if: gitea.ref == 'refs/heads/main' || gitea.ref == 'refs/heads/master'
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            docker stop quantclaw_app || true
            docker rm quantclaw_app || true
            docker run -d \
              --name quantclaw_app \
              -e PG_HOST=6.6.6.66 \
              -e PG_PORT=5432 \
              -e PG_USER=quantclaw \
              -e PG_PASSWORD=${{ secrets.PG_PASSWORD }} \
              -e PG_DBNAME=web_admin \
              -e PG_POOL_MIN=2 \
              -e PG_POOL_MAX=10 \
              -e JWT_SECRET=${{ secrets.JWT_SECRET }} \
              -p 8082:8081 \
              --restart always \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}