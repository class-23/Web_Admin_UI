name: CI/CD to Gitea

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  SERVER_HOST: 6.6.6.66
  SERVER_USER: quant

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        run: |
          if command -v apt-get &> /dev/null; then
            apt-get update && apt-get install -y openssh-client sshpass
          elif command -v apk &> /dev/null; then
            apk add --no-cache openssh-client sshpass
          elif command -v yum &> /dev/null; then
            yum install -y openssh-clients sshpass
          fi

          sshpass -p "123quant-speed" ssh -o StrictHostKeyChecking=no "quant@6.6.66" "echo '123quant-speed' | sudo -S bash -c 'cd /home/quant/data/dev/Web_Admin_UI && git pull && docker compose up -d && docker logs --tail 30 quantclaw_app || true'"